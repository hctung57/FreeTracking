<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Free Tracking</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <main class="app">
      <header class="header card">
        <div class="brand-block">
          <img class="app-logo" src="../assets/icon-128.png" alt="Free Tracking logo" />
          <div>
            <h1>Free Tracking</h1>
            <p>USPS batch tracking &amp; Excel export</p>
          </div>
        </div>
        <button class="theme-toggle" id="themeToggle" type="button" title="Switch theme">
          <span class="theme-knob"></span>
          <svg class="theme-icon theme-icon-dark" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="theme-icon theme-icon-pink" viewBox="0 0 24 24" width="14" height="14" fill="currentColor" stroke="none">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
      </header>

      <section class="layout">
        <article class="card input-card">
          <span class="status-dot" id="statusDot"></span>
          <div class="mode-bar">
            <div class="mode-switch" role="group" aria-label="Input mode" id="modeSwitch">
              <div class="mode-slider"></div>
              <button id="manualModeButton" class="mode-button active" type="button">Manual</button>
              <button id="fileModeButton" class="mode-button" type="button">File</button>
            </div>
          </div>

          <div class="mode-panels">
            <div id="manualInputSection" class="mode-panel">
              <label for="trackingInput">Tracking Numbers</label>
              <textarea id="trackingInput" placeholder="One tracking number per line"></textarea>
            </div>

            <div id="fileInputSection" class="mode-panel mode-out">
              <div class="upload-zone" id="uploadZone">
                <svg class="upload-icon" viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v1a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4v-1"/>
                  <polyline points="17 8 12 3 7 8"/>
                  <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p class="upload-cta">Choose a file or drag it here</p>
                <p class="upload-meta">CSV / XLSX &mdash; TRACKING_ID column required</p>
                <input id="fileInput" type="file" accept=".csv,.xlsx,.xls" />
              </div>
              <div class="file-card hidden" id="fileCard">
                <div class="file-card-info">
                  <span class="file-card-name" id="fileCardName"></span>
                  <span class="file-card-count" id="fileCardCount"></span>
                </div>
                <button class="file-card-remove" id="fileRemoveBtn" type="button" title="Remove file">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>

        </article>

        <aside class="card stats-card">
          <h3 class="stats-title">Overview</h3>
          <div class="stats-grid">
            <div class="stat">
              <strong id="totalCount">0</strong>
              <span>Total</span>
            </div>
            <div class="stat">
              <strong id="processedCount">0</strong>
              <span>Processed</span>
            </div>
            <div class="stat">
              <strong id="successCount">0</strong>
              <span>Success</span>
            </div>
            <div class="stat">
              <strong id="errorCount">0</strong>
              <span>Errors</span>
            </div>
          </div>

          <div class="progress-wrap" id="progressWrap">
            <div class="progress-meta">
              <span>Progress</span>
              <strong id="currentStatus">0%</strong>
            </div>
            <div class="progress-track" aria-label="Job progress">
              <div id="progressBar" class="progress-bar"></div>
            </div>
          </div>

          <p class="form-error" id="formError"></p>

          <div class="actions">
            <button id="resetButton" class="icon-btn" type="button" title="Reset">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"/>
                <path d="M21 20v-7a6 6 0 0 0-6-6H4"/>
              </svg>
            </button>
            <button id="actionButton" class="icon-btn primary" type="button" title="Start tracking job">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" stroke="none">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
            </button>
            <button id="downloadButton" class="icon-btn" type="button" disabled title="Start a job to enable download">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>
          </div>
        </aside>
      </section>

      <section class="card log-card">
        <div class="log-header">
          <h2>Results</h2>
          <span id="logCount">0 items</span>
        </div>
        <div id="logList" class="log-list"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
