<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Free Tracking</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Free Tracking</h1>
        <p>USPS batch tracking &amp; Excel export</p>
      </header>

      <section class="main-card">
        <div class="mode-switch" role="group" aria-label="Input mode">
          <button id="manualModeButton" class="mode-button active" type="button">Manual</button>
          <button id="fileModeButton" class="mode-button" type="button">File</button>
        </div>

        <div id="manualInputSection">
          <textarea id="trackingInput" placeholder="One tracking number per line"></textarea>
        </div>

        <div id="fileInputSection" class="hidden">
          <div class="upload-zone">
            <input id="fileInput" type="file" accept=".csv,.xlsx,.xls" />
            <span id="fileInfo">Drop or choose a CSV / XLSX file</span>
          </div>
        </div>

        <div class="stats-row">
          <span>Total <strong id="totalCount">0</strong></span>
          <span class="sep">&middot;</span>
          <span>Done <strong id="processedCount">0</strong></span>
          <span class="sep">&middot;</span>
          <span class="stat-ok">OK <strong id="successCount">0</strong></span>
          <span class="sep">&middot;</span>
          <span class="stat-err">Err <strong id="errorCount">0</strong></span>
        </div>

        <div class="progress-wrap hidden" id="progressWrap">
          <div class="progress-track">
            <div id="progressBar" class="progress-bar"></div>
          </div>
          <span id="currentStatus">0%</span>
        </div>

        <div class="actions">
          <button id="resetButton" class="tertiary" type="button">Reset</button>
          <button id="actionButton" type="button">Start</button>
          <button id="downloadButton" class="secondary" disabled>Download</button>
        </div>
      </section>

      <section class="results-section">
        <div class="results-header">
          <span id="logCount">No results yet</span>
        </div>
        <div id="logList" class="log-list"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
