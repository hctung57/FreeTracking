<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Free Tracking</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <main class="app">
      <header class="header card">
        <div class="brand-block">
          <img class="app-logo" src="../assets/icon-128.png" alt="Free Tracking logo" />
          <div>
            <h1>Free Tracking</h1>
            <p>USPS batch tracking &amp; Excel export</p>
          </div>
        </div>
      </header>

      <section class="layout">
        <article class="card input-card">
          <div class="mode-switch" role="group" aria-label="Input mode" id="modeSwitch">
            <div class="mode-slider"></div>
            <button id="manualModeButton" class="mode-button active" type="button">Manual</button>
            <button id="fileModeButton" class="mode-button" type="button">File</button>
          </div>

          <div class="mode-panels">
            <div id="manualInputSection" class="mode-panel">
              <label for="trackingInput">Tracking Numbers</label>
              <textarea id="trackingInput" placeholder="One tracking number per line"></textarea>
            </div>

            <div id="fileInputSection" class="mode-panel mode-out">
              <div class="upload-zone" id="uploadZone">
                <svg class="upload-icon" viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v1a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4v-1"/>
                  <polyline points="17 8 12 3 7 8"/>
                  <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p class="upload-cta">Choose a file or drag it here</p>
                <p class="upload-meta">CSV / XLSX &mdash; TRACKING_ID column required</p>
                <input id="fileInput" type="file" accept=".csv,.xlsx,.xls" />
              </div>
              <div class="file-row" id="fileRow" style="display:none">
                <span id="fileInfo"></span>
              </div>
            </div>
          </div>

        </article>

        <aside class="card stats-card">
          <div class="stats-grid">
            <div class="stat">
              <strong id="totalCount">0</strong>
              <span>Total</span>
            </div>
            <div class="stat">
              <strong id="processedCount">0</strong>
              <span>Processed</span>
            </div>
            <div class="stat">
              <strong id="successCount">0</strong>
              <span>Success</span>
            </div>
            <div class="stat">
              <strong id="errorCount">0</strong>
              <span>Errors</span>
            </div>
          </div>

          <div class="progress-wrap hidden" id="progressWrap">
            <div class="progress-meta">
              <span>Progress</span>
              <strong id="currentStatus">0%</strong>
            </div>
            <div class="progress-track" aria-label="Job progress">
              <div id="progressBar" class="progress-bar"></div>
            </div>
          </div>

          <p class="form-error" id="formError"></p>

          <div class="actions">
            <button id="resetButton" class="tertiary" type="button">Reset</button>
            <button id="actionButton" type="button">Start</button>
            <button id="downloadButton" class="secondary" disabled>Download</button>
          </div>
        </aside>
      </section>

      <section class="card log-card">
        <div class="log-header">
          <h2>Results</h2>
          <span id="logCount">0 items</span>
        </div>
        <div id="logList" class="log-list"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
