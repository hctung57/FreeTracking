<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Free Tracking USPS Export</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <main class="app">
      <header class="header card">
        <div>
          <h1>USPS Tracking Export</h1>
          <p>Paste tracking numbers, run batch lookup, and download Excel.</p>
        </div>
        <div class="header-actions">
          <button id="resetButton" class="tertiary" type="button">Reset</button>
          <div class="status-chip" id="jobStatePill">Idle</div>
        </div>
      </header>

      <section class="layout">
        <article class="card input-card">
          <div class="mode-switch" role="group" aria-label="Input mode">
            <button id="manualModeButton" class="mode-button active" type="button">Manual Tracking</button>
            <button id="fileModeButton" class="mode-button" type="button">Order File</button>
          </div>

          <div id="manualInputSection">
            <label for="trackingInput">Tracking Numbers</label>
            <textarea id="trackingInput" placeholder="One tracking number per line"></textarea>
          </div>

          <div id="fileInputSection" class="hidden">
            <label for="fileInput">Order File (CSV/XLSX)</label>
            <div class="file-row">
              <input id="fileInput" type="file" accept=".csv,.xlsx,.xls" />
              <span id="fileInfo" class="file-info">No file selected</span>
            </div>
          </div>

          <div class="actions">
            <button id="startButton">Start</button>
            <button id="downloadButton" class="secondary" disabled>Download Excel</button>
          </div>
          <p class="hint">Batch size: 35 tracking numbers per request.</p>
        </article>

        <aside class="card stats-card">
          <div class="stat"><span>Total</span><strong id="totalCount">0</strong></div>
          <div class="stat"><span>Processed</span><strong id="processedCount">0</strong></div>
          <div class="stat"><span>Success</span><strong id="successCount">0</strong></div>
          <div class="stat"><span>Errors</span><strong id="errorCount">0</strong></div>
          <div class="progress-wrap hidden" id="progressWrap">
            <div class="progress-meta">
              <span>Progress</span>
              <strong id="currentStatus">0%</strong>
            </div>
            <div class="progress-track" aria-label="Job progress">
              <div id="progressBar" class="progress-bar"></div>
            </div>
          </div>
        </aside>
      </section>

      <section class="card log-card">
        <div class="log-header">
          <h2>Latest Results</h2>
          <span id="logCount">0 items</span>
        </div>
        <div id="logList" class="log-list"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
